<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tebasaenterar — Mi Carrito</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/nav.css">
  <style>
    /* Hallmark · genre: playful · macrostructure: (utility cart page)
     * theme: adapted-Hum (brand-anchored) · nav: N1b · footer: Ft2
     * contrast: pass (40-41) · tokens: pass (48) · mobile: pass (34,49-57)
     */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: clip; }

    body {
      font-family: var(--font-body);
      background-color: var(--color-paper);
      color: var(--color-ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      line-height: 1.5;
    }

    /* nav: ver /static/css/nav.css */

    /* ─── Main ─── */
    .cart-main {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: var(--space-2xl) var(--space-xl);
    }
    .cart-header {
      margin-bottom: var(--space-xl);
      padding-bottom: var(--space-lg);
      border-bottom: 3px solid var(--color-ink);
    }
    .cart-header__eyebrow {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--color-ink-2);
      margin-bottom: var(--space-sm);
    }
    .cart-header__title {
      font-family: var(--font-display);
      font-size: var(--text-display-s);
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      line-height: 1.0;
      overflow-wrap: anywhere;
      min-width: 0;
    }

    /* Cart content container — JS injects here */
    #carrito-info {}

    /* Cart table styles (injected by JS) */
    .cart-table {
      width: 100%;
      border-collapse: collapse;
      border: 2px solid var(--color-ink);
      margin-bottom: var(--space-xl);
      font-family: var(--font-mono);
    }
    .cart-table th {
      background-color: var(--color-ink);
      color: var(--color-paper);
      padding: var(--space-md) var(--space-lg);
      font-size: var(--text-xs);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      text-align: left;
    }
    .cart-table td {
      padding: var(--space-md) var(--space-lg);
      font-size: var(--text-sm);
      font-weight: 600;
      border-bottom: 1px solid var(--color-border);
      vertical-align: top;
    }
    .cart-table tr:last-child td { border-bottom: none; }
    .cart-table tr:nth-child(even) td { background-color: var(--color-paper-2); }

    /* Evento resumen (injected by JS) */
    .evento-resumen {
      display: flex;
      gap: var(--space-lg);
      align-items: flex-start;
      margin: var(--space-xl) 0;
      padding: var(--space-xl);
      border: 2px solid var(--color-ink);
      background-color: var(--color-paper-2);
    }
    .evento-resumen img {
      width: 120px;
      height: auto;
      border: 2px solid var(--color-ink);
      filter: grayscale(100%);
      flex-shrink: 0;
    }
    .evento-resumen h4 {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 800;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      margin-bottom: var(--space-sm);
      overflow-wrap: anywhere;
      min-width: 0;
    }
    .evento-resumen div div {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--color-ink-2);
      margin-top: 4px;
    }

    /* Section headings injected by JS */
    #carrito-info h3 {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 800;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      margin-bottom: var(--space-lg);
      margin-top: var(--space-2xl);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    #carrito-info h3:first-child { margin-top: 0; }

    /* Error/success states */
    .cart-error {
      padding: var(--space-lg);
      background-color: oklch(95% 0.04 30);
      border: 2px solid var(--color-alert);
      color: oklch(30% 0.08 30);
      font-weight: 700;
      font-family: var(--font-mono);
      font-size: var(--text-sm);
    }

    /* ─── Footer Ft2 inline ─── */
    .site-footer {
      border-top: 3px solid var(--color-ink);
      padding: var(--space-lg) var(--space-xl);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--space-md);
    }
    .footer-text {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-ink-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .footer-text a {
      color: var(--color-ink-2);
      text-decoration: none;
      transition: color var(--dur-micro) var(--ease-out);
    }
    .footer-text a:hover { color: var(--color-accent); }
    .footer-text a:focus-visible { outline: 2px solid var(--color-focus); outline-offset: 2px; }

    /* ─── Responsive ─── */
    @media (max-width: 60rem) {
      .nav-inner  { padding: 0 var(--space-lg); }
      .cart-main  { padding: var(--space-xl) var(--space-lg); }
    }
    @media (max-width: 40rem) {
      .nav-inner  { padding: 0 var(--space-md); }
      .cart-main  { padding: var(--space-xl) var(--space-md); }
      .cart-header__title { font-size: var(--text-4xl); }
      .evento-resumen { flex-direction: column; }
      .evento-resumen img { width: 100%; max-width: 200px; }
      .site-footer { padding: var(--space-md); flex-direction: column; align-items: flex-start; }
      .cart-table { font-size: var(--text-xs); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 150ms !important; }
    }
  </style>
</head>
<body>

  {% include 'partials/nav.html' %}

  <!-- Main -->
  <main class="cart-main">
    <div class="cart-header">
      <p class="cart-header__eyebrow">Resumen de compra · Circular 44/2024</p>
      <h1 class="cart-header__title">Mi&nbsp;Carrito</h1>
    </div>
    <div id="carrito-info" role="region" aria-live="polite" aria-label="Contenido del carrito"></div>
  </main>

  <!-- Footer Ft2 inline -->
  <footer class="site-footer">
    <p class="footer-text">&#169; 2026 <a href="/">Tebasaenterar</a> · Todos los derechos vendidos</p>
    <p class="footer-text">Circular 44/2024 · <a href="/marketplace">Volver al Mercado</a></p>
  </footer>

  <script>
    function cargarCarrito() {
      fetch('/load_cart')
        .then(res => res.text())
        .then(texto => {
          const carritoDiv = document.getElementById('carrito-info');
          if (texto.startsWith("Error")) {
            carritoDiv.innerHTML = '<p class="cart-error">' + texto + '</p>';
            return;
          }
          let cart = {};
          try {
            cart = eval('(' + texto + ')');
          } catch (e) {
            carritoDiv.innerHTML = '<p class="cart-error">Error al analizar el carrito</p>';
            return;
          }
          fetch('/static/events.json')
            .then(res => res.json())
            .then(eventos => {
              const evento = eventos.find(ev => String(ev.id) === String(cart.eventId));
              if (!evento) {
                carritoDiv.innerHTML = '<p>Carrito cargado, pero no se encontró información del evento.</p>';
                return;
              }
              carritoDiv.innerHTML =
                '<h3><span class="material-symbols-outlined" aria-hidden="true" style="font-size:1em;line-height:1">shopping_cart</span> Tu carrito</h3>' +
                '<table class="cart-table">' +
                '<thead><tr><th>Campo</th><th>Valor</th></tr></thead>' +
                '<tbody>' +
                '<tr><td>Nombre</td><td>' + cart.nombre + '</td></tr>' +
                '<tr><td>Email</td><td>' + cart.email + '</td></tr>' +
                '<tr><td>Cantidad</td><td>' + cart.cantidad + '</td></tr>' +
                '<tr><td>Zona</td><td>' + cart.zona + '</td></tr>' +
                '</tbody>' +
                '</table>' +
                '<h3><span class="material-symbols-outlined" aria-hidden="true" style="font-size:1em;line-height:1">confirmation_number</span> Información del Evento</h3>' +
                '<div class="evento-resumen">' +
                '<img src="' + evento.img + '" alt="' + (evento.alt || evento.title) + '">' +
                '<div>' +
                '<h4>' + evento.title + '</h4>' +
                '<div><strong>Fecha:</strong> ' + (evento.date || '') + (evento.time ? ' · ' + evento.time : '') + '</div>' +
                '<div><strong>Ciudad:</strong> ' + (evento.city || '') + '</div>' +
                '<div><strong>Lugar:</strong> ' + (evento.venue || '') + '</div>' +
                '</div>' +
                '</div>';
            })
            .catch(() => {
              carritoDiv.innerHTML = '<p>Carrito cargado, pero no se pudo cargar la info del evento.</p>';
            });
        })
        .catch(() => {
          document.getElementById('carrito-info').innerHTML = '<p class="cart-error">Error al cargar carrito</p>';
        });
    }

    window.addEventListener('DOMContentLoaded', cargarCarrito);
  </script>

</body>
</html>
